      <path d="M92 226h94"/><path d="M436 226h108"/><path d="M312 12v68"/><path d="M312 426v92"/>
      <circle cx="88" cy="226" r="7" fill="#67e8f9"/><circle cx="548" cy="226" r="7" fill="#67e8f9"/><circle cx="312" cy="10" r="7" fill="#67e8f9"/><circle cx="312" cy="520" r="7" fill="#67e8f9"/>
    </g>
  </g>

  <g transform="translate(92 672)">
    <text x="0" y="0" font-family="Inter,Arial,sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">PPT Narration Agent</text>
    <text x="3" y="55" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="600" fill="#bfdbfe">Generate beautiful slides, speaker scripts, voiceprints and narrated videos from prompts and reference files.</text>
    <g transform="translate(0 92)" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">
      <rect x="0" y="0" width="170" height="44" rx="22" fill="#2563eb" opacity="0.92"/><text x="28" y="29" fill="#fff">PPTX</text>
      <rect x="190" y="0" width="205" height="44" rx="22" fill="#7c3aed" opacity="0.92"/><text x="218" y="29" fill="#fff">scripts.json</text>
      <rect x="415" y="0" width="180" height="44" rx="22" fill="#0891b2" opacity="0.92"/><text x="443" y="29" fill="#fff">Voice Clone</text>
      <rect x="615" y="0" width="170" height="44" rx="22" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.72"/><text x="645" y="29" fill="#dbeafe">MP4 Video</text>
    </g>
