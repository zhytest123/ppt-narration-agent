    <path d="M278 169l17 16 30-42" stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="410" y="92" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#e0f2fe">Speaker Script</text>
    <path d="M414 134h168M414 164h128M414 194h188" stroke="#67e8f9" stroke-opacity="0.78" stroke-width="12" stroke-linecap="round"/>
    <circle cx="602" cy="156" r="20" fill="#f472b6" opacity="0.85"/>

    <text x="66" y="312" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#e0f2fe">Voice Clone</text>
