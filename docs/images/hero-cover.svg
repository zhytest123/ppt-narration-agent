    </g>
    <circle cx="260" cy="374" r="28" fill="#38bdf8" opacity="0.18"/>

    <text x="358" y="312" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#0f172a">Narrated Video</text>
    <rect x="358" y="342" width="216" height="76" rx="18" fill="#0f172a" opacity="0.88"/>
    <path d="M444 361l58 19-58 19z" fill="#67e8f9"/>
    <path d="M594 350c18 14 28 30 28 52s-10 38-28 52" stroke="#2563eb" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>

  <g transform="translate(875 88)" filter="url(#shadow)">
    <circle cx="310" cy="238" r="202" fill="#67e8f9" opacity="0.08"/>
