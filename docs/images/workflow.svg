<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="PPT Narration Agent workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff" stop-opacity=".98"/><stop offset="1" stop-color="#e0f2fe" stop-opacity=".96"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity=".22"/></filter>
  </defs>
  <rect width="980" height="360" rx="28" fill="url(#bg)"/>
  <text x="50" y="62" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">PPT Narration Agent</text>
  <text x="50" y="92" fill="#bfdbfe" font-family="Inter,Arial,sans-serif" font-size="15">Natural language + reference files → editable PPTX + page-by-page narration</text>
  <g font-family="Inter,Arial,sans-serif" filter="url(#shadow)">
    <rect x="48" y="130" width="178" height="128" rx="20" fill="url(#card)"/>
    <text x="72" y="166" fill="#0f172a" font-size="18" font-weight="700">Inputs</text>
    <text x="72" y="196" fill="#334155" font-size="14">Prompt</text><text x="72" y="219" fill="#334155" font-size="14">PDF / PPTX / DOCX</text><text x="72" y="242" fill="#334155" font-size="14">Data & brand refs</text>
    <rect x="288" y="130" width="178" height="128" rx="20" fill="url(#card)"/>
    <text x="312" y="166" fill="#0f172a" font-size="18" font-weight="700">Agent Planner</text>
    <text x="312" y="196" fill="#334155" font-size="14">Outline</text><text x="312" y="219" fill="#334155" font-size="14">Storyboard</text><text x="312" y="242" fill="#334155" font-size="14">Speaker script</text>
    <rect x="528" y="130" width="178" height="128" rx="20" fill="url(#card)"/>
    <text x="552" y="166" fill="#0f172a" font-size="18" font-weight="700">Visual Renderer</text>
    <text x="552" y="196" fill="#334155" font-size="14">Charts & cards</text><text x="552" y="219" fill="#334155" font-size="14">Timeline / process</text><text x="552" y="242" fill="#334155" font-size="14">Editable PPTX</text>
    <rect x="768" y="130" width="164" height="128" rx="20" fill="url(#card)"/>
    <text x="792" y="166" fill="#0f172a" font-size="18" font-weight="700">Outputs</text>
    <text x="792" y="196" fill="#334155" font-size="14">PPTX</text><text x="792" y="219" fill="#334155" font-size="14">scripts.json</text><text x="792" y="242" fill="#334155" font-size="14">Video package</text>
  </g>
  <g stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round"><path d="M232 194h48"/><path d="M472 194h48"/><path d="M712 194h48"/></g>
  <g fill="#93c5fd"><path d="M280 194l-12-8v16z"/><path d="M520 194l-12-8v16z"/><path d="M760 194l-12-8v16z"/></g>
</svg>
